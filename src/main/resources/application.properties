spring.application.name=golemcore-brain
spring.web.resources.static-locations=classpath:/static/
brain.storage-root=${BRAIN_STORAGE_ROOT:data/wiki}
brain.site-title=${BRAIN_SITE_TITLE:GolemCore Brain}
brain.image-version=${BRAIN_IMAGE_VERSION:dev}
brain.seed-demo-content=${BRAIN_SEED_DEMO_CONTENT:true}
brain.auth-disabled=${BRAIN_AUTH_DISABLED:false}
brain.public-access=${BRAIN_PUBLIC_ACCESS:false}
brain.admin-username=${BRAIN_ADMIN_USERNAME:admin}
brain.admin-email=${BRAIN_ADMIN_EMAIL:admin@example.com}
brain.admin-password=${BRAIN_ADMIN_PASSWORD:admin}
brain.session-ttl-seconds=${BRAIN_SESSION_TTL_SECONDS:604800}
brain.jwt.secret=${BRAIN_JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
brain.jwt.issuer=${BRAIN_JWT_ISSUER:golemcore-brain}
brain.default-space-slug=${BRAIN_DEFAULT_SPACE_SLUG:default}
brain.default-space-name=${BRAIN_DEFAULT_SPACE_NAME:Default}
