name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Resolve Playwright version
        id: playwright-version
        working-directory: frontend
        run: |
          version="$(node -p 'require("./node_modules/@playwright/test/package.json").version')"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Run backend unit tests
        run: ./mvnw -Dtest='!*IntegrationTest' test

      - name: Run backend integration tests
        run: ./mvnw -Dtest='*IntegrationTest' test

      - name: Check Codecov token availability
        if: always()
        id: codecov-token
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [[ -n "${CODECOV_TOKEN}" ]]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "available=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Upload coverage to Codecov
        if: always() && steps.codecov-token.outputs.available == 'true'
        uses: codecov/codecov-action@v6
        with:
          files: ./target/site/jacoco/jacoco.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          handle_no_reports_found: true

      - name: Skip Codecov upload
        if: always() && steps.codecov-token.outputs.available != 'true'
        run: echo "Skipping Codecov upload because CODECOV_TOKEN is unavailable for this event."

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Run frontend build
        working-directory: frontend
        run: npm run build

      - name: Package application
        run: ./mvnw -DskipTests package

      - name: Install Playwright browsers and system dependencies
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run packaged context-path smoke test
        run: bash .github/scripts/run-brain-context-smoke.sh

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check changed files English-only policy
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: python3 .github/scripts/check-only-english.py

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Check formatting
        run: ./mvnw -Dskip.frontend=true formatter:validate

      - name: Run PMD
        run: ./mvnw -P strict -Dskip.frontend=true pmd:check

      - name: Run SpotBugs
        run: ./mvnw -P strict -Dskip.frontend=true compile spotbugs:check

      - name: Upload PMD report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pmd-report
          path: target/pmd.xml

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml
